name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Estáticos: tipos, lint y dependencias vulnerables ──────────────────
  # Rápidos y sin dependencias externas: corren siempre, en todo push/PR.
  static-checks:
    name: Typecheck, lint & audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npx eslint .

      - name: Auditoría de dependencias (SEC-05)
        # No rompe el build por vulnerabilidades moderadas ya conocidas y
        # aceptadas (ver docs/pruebas/analisis-riesgos-seguridad.md, SEC-05).
        # Si aparece una nueva vulnerabilidad ALTA o CRÍTICA, el pipeline falla.
        run: npm audit --audit-level=high

  # ── Build de producción ─────────────────────────────────────────────────
  build:
    name: Build (next build)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_URL_API: http://localhost:5000
          JWT_SECRET_API: ci-placeholder-not-used-at-runtime

  # ── E2E (Playwright) contra el backend real (Render) ────────────────────
  # El frontend corre efímero dentro del runner (igual que `npm run dev`
  # localmente) y apunta al backend público en Render vía NEXT_PUBLIC_URL_API.
  # Requiere las Variables NEXT_PUBLIC_URL_API y E2E_ENABLED=true, y los
  # Secrets E2E_SUPERADMIN_EMAIL, E2E_SUPERADMIN_PASSWORD,
  # E2E_AGENCIA_ADMIN_EMAIL, E2E_AGENCIA_ADMIN_PASSWORD (Settings → Secrets
  # and variables → Actions). Sin E2E_ENABLED=true, este job se omite y no
  # rompe el pipeline — ver docs/pruebas/plan-de-pruebas.md §7.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: static-checks
    if: ${{ vars.E2E_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps chromium

      - name: Despertar el backend (Render free tier duerme tras inactividad)
        run: |
          for i in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.NEXT_PUBLIC_URL_API }}/docs" || echo "000")
            if [ "$code" != "000" ]; then echo "Backend responde (HTTP $code)"; break; fi
            echo "Esperando al backend... intento $i/12"; sleep 10
          done

      - name: Ejecutar suite E2E
        run: npx playwright test --project=setup --project=chromium
        env:
          NEXT_PUBLIC_URL_API: ${{ vars.NEXT_PUBLIC_URL_API }}
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-ephemeral-secret-solo-para-esta-corrida
          E2E_BASE_URL: http://localhost:3000
          E2E_SUPERADMIN_EMAIL: ${{ secrets.E2E_SUPERADMIN_EMAIL }}
          E2E_SUPERADMIN_PASSWORD: ${{ secrets.E2E_SUPERADMIN_PASSWORD }}
          E2E_AGENCIA_ADMIN_EMAIL: ${{ secrets.E2E_AGENCIA_ADMIN_EMAIL }}
          E2E_AGENCIA_ADMIN_PASSWORD: ${{ secrets.E2E_AGENCIA_ADMIN_PASSWORD }}

      - name: Subir reporte HTML de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
